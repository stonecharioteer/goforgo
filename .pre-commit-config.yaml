repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt cmd and internal
        entry: bash -c 'unformatted=$(gofmt -l $(find cmd internal -name "*.go" -type f)); if [ -n "$unformatted" ]; then echo "The following files need gofmt:"; echo "$unformatted"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy check
        entry: bash -c 'go mod tidy && git diff --exit-code -- go.mod go.sum'
        language: system
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint cmd and internal
        entry: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0 run ./cmd/... ./internal/...
        language: system
        pass_filenames: false

      - id: govulncheck
        name: govulncheck cmd and internal (advisory)
        entry: bash -c 'go run golang.org/x/vuln/cmd/govulncheck@latest ./cmd/... ./internal/... || { echo "govulncheck reported vulnerabilities; review output above"; exit 0; }'
        language: system
        pass_filenames: false

      - id: go-test
        name: Go tests
        entry: go test ./cmd/... ./internal/...
        language: system
        pass_filenames: false

      - id: go-build
        name: build CLI
        entry: bash -c 'mkdir -p bin && go build -o ./bin/goforgo ./cmd/goforgo'
        language: system
        pass_filenames: false

      - id: exercise-integrity
        name: exercise integrity check
        entry: go run ./cmd/check-exercises
        language: system
        pass_filenames: false

      - id: conventional-commit-msg
        name: conventional commit message
        entry: >-
          bash -c 'msg_file="$1"; subject=$(head -n 1 "$msg_file"); if printf "%s" "$subject" | grep -Eq "^(Merge|Revert)"; then exit 0; fi; if ! printf "%s" "$subject" | grep -Eq "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([A-Za-z0-9._-]+\))?!?: .+"; then echo "Commit message must follow Conventional Commits, for example: feat: add exercise checks"; exit 1; fi' --
        language: system
        stages: [commit-msg]

      - id: no-claude-attribution
        name: reject Claude attribution
        entry: >-
          bash -c 'msg_file="$1"; if grep -Eiq "(co-authored-by:.*claude|generated with .*claude|claude code)" "$msg_file"; then echo "Commit messages must not include Claude attribution or Generated with Claude Code footers."; exit 1; fi' --
        language: system
        stages: [commit-msg]
