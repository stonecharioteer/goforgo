name: Bug report
description: Report a reproducible problem with GoForGo
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include commands, exercise names, and relevant output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GoForGo version
      placeholder: goforgo --version
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go version
