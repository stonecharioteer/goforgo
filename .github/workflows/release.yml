name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: goforgo-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: goforgo-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: goforgo-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: goforgo-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: goforgo-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p dist
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags="-s -w -X 'github.com/stonecharioteer/goforgo/internal/cli.version=${VERSION}' -X 'github.com/stonecharioteer/goforgo/internal/cli.commit=${COMMIT}' -X 'github.com/stonecharioteer/goforgo/internal/cli.date=${DATE}'" \
            -o "dist/${{ matrix.artifact }}" \
            ./cmd/goforgo

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
